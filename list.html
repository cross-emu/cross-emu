<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameBoy CPU - Checklist des Tests</title>
    <style>
        :root {
            --bg-color: #1e1e24;
            --card-bg: #2a2a35;
            --text-color: #f4f4f9;
            --accent-color: #4caf50;
            --accent-disabled: #ff9800;
            --invalid-color: #ef5350;
            --border-color: #3f3f52;
            --blue-btn: #2196f3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        h1 { margin-top: 0; color: #fff; font-size: 24px; }

        .progress-container {
            background: #111;
            border-radius: 20px;
            position: relative;
            height: 24px;
            width: 100%;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, #4caf50, #81c784);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 2px;
            font-weight: bold;
            font-size: 14px;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            flex-wrap: wrap;
            align-items: center;
        }

        input[type="text"] {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
            flex: 2;
            min-width: 200px;
        }

        .btn-filter, .btn-json {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .btn-filter.active, .btn-filter:hover {
            background: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }

        .btn-json {
            background: #3a3a4a;
            border-color: #555;
        }
        .btn-json:hover {
            background: var(--blue-btn);
            color: #fff;
            border-color: var(--blue-btn);
        }

        .json-actions {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .opcode-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.15s, border-color 0.15s;
        }

        .opcode-card:hover {
            transform: translateY(-2px);
            border-color: #666;
        }

        .opcode-card.completed { border-left: 5px solid var(--accent-color); }
        .opcode-card.pending { border-left: 5px solid var(--accent-disabled); }
        .opcode-card.invalid { border-left: 5px solid var(--invalid-color); opacity: 0.6; cursor: not-allowed; }

        .opcode-hex {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            background: #111;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 14px;
            min-width: 35px;
            text-align: center;
        }

        .opcode-info { display: flex; flex-direction: column; flex-grow: 1; }
        .opcode-name { font-weight: 600; font-size: 15px; }
        .opcode-meta { font-size: 11px; color: #888; margin-top: 2px; }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        #file-input { display: none; }
    </style>
</head>
<body>

<header>
    <h1>GameBoy CPU Standard Opcodes — Suivi des Tests</h1>
    <div id="stats-summary">Opcodes de base validés : <span id="checked-count">0</span> / 244</div>
    <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
        <div class="progress-text" id="progress-text">0%</div>
    </div>
</header>

<div class="controls">
    <input type="text" id="search" placeholder="Rechercher une instruction (ex: LD, INC, 0x04)..." oninput="filterCards()">
    <button class="btn-filter active" onclick="setFilter('all', this)">Tous</button>
    <button class="btn-filter" onclick="setFilter('pending', this)">Restants</button>
    <button class="btn-filter" onclick="setFilter('completed', this)">Complétés</button>
    <button class="btn-filter" onclick="setFilter('invalid', this)">Invalides</button>
    
    <div class="json-actions">
        <button class="btn-json" onclick="exportJSON()">💾 Exporter JSON</button>
        <button class="btn-json" onclick="triggerImport()">📂 Importer JSON</button>
        <input type="file" id="file-input" accept=".json" onchange="importJSON(event)">
    </div>
</div>

<div class="grid" id="opcode-grid"></div>

<script>

        0xE3: { m: "INVALID", inv: true }, 0xE4: { m: "INVALID", inv: true }, 0xEB: { m: "INVALID", inv: true },
        0xEC: { m: "INVALID", inv: true }, 0xED: { m: "INVALID", inv: true },
        0xE0: { m: "LDH [a8], A" },      0xE1: { m: "POP HL" },             0xE2: { m: "LD [C], A" },          0xE5: { m: "PUSH HL" },
        0xE6: { m: "AND d8" },           0xE7: { m: "RST 20H" },            0xE8: { m: "ADD SP, r8" },         0xE9: { m: "JP HL" },
        0xEA: { m: "LD [a16], A" },      0xEE: { m: "XOR d8" },             0xEF: { m: "RST 28H" },
        
        0xF4: { m: "INVALID", inv: true }, 0xFC: { m: "INVALID", inv: true }, 0xFD: { m: "INVALID", inv: true },
        0xF0: { m: "LDH A, [a8]" },      0xF1: { m: "POP AF" },             0xF2: { m: "LD A, [C]" },          0xF3: { m: "DI" },
        0xF5: { m: "PUSH AF" },          0xF6: { m: "OR d8" },              0xF7: { m: "RST 30H" },            0xF8: { m: "LD HL, SP+r8" },
        0xF9: { m: "LD SP, HL" },        0xFA: { m: "LD A, [a16]" },        0xFB: { m: "EI" },                 0xFE: { m: "CP d8" },

    let currentFilter = 'all';

    function init() {
        const stored = JSON.parse(localStorage.getItem('gb_opcode_tests')) || {};
        const grid = document.getElementById('opcode-grid');
        grid.innerHTML = ''; // Clear pour la ré-importation
        
        for (let i = 0; i <= 255; i++) {
            const op = opcodesData[i];
            if (!op) continue;

            let isCompleted = op.c || false;
            if (stored[i] !== undefined) {
                isCompleted = stored[i];
            } else {
                stored[i] = isCompleted;
            }

            const card = document.createElement('div');
            card.className = `opcode-card ${op.inv ? 'invalid' : (isCompleted ? 'completed' : 'pending')}`;
            card.id = `op-${i}`;
            card.setAttribute('data-hex', `0x${i.toString(16).toUpperCase().padStart(2, '0')}`);
            card.setAttribute('data-name', op.m.toUpperCase());
            card.setAttribute('data-status', op.inv ? 'invalid' : (isCompleted ? 'completed' : 'pending'));

            card.innerHTML = `
                <span class="opcode-hex">0x${i.toString(16).toUpperCase().padStart(2, '0')}</span>
                <div class="opcode-info">
                    <span class="opcode-name">${op.m}</span>
                    <span class="opcode-meta">${op.inv ? 'Hors Target' : (isCompleted ? 'Test écrit' : 'En attente')}</span>
                </div>
                ${!op.inv ? `<input type="checkbox" ${isCompleted ? 'checked' : ''} onclick="toggleOpcode(${i}, event)">` : ''}
            `;

            if (!op.inv) {
                card.onclick = () => {
                    const checkbox = card.querySelector('input');
                    checkbox.checked = !checkbox.checked;
                    toggleOpcode(i);
                };
            }

            grid.appendChild(card);
        }
        localStorage.setItem('gb_opcode_tests', JSON.stringify(stored));
        updateProgress();
    }

    function toggleOpcode(id, event) {
        if(event) event.stopPropagation();
        const card = document.getElementById(`op-${id}`);
        const checkbox = card.querySelector('input');
        const stored = JSON.parse(localStorage.getItem('gb_opcode_tests'));
        
        stored[id] = checkbox.checked;
        localStorage.setItem('gb_opcode_tests', JSON.stringify(stored));

        if (checkbox.checked) {
            card.className = 'opcode-card completed';
            card.setAttribute('data-status', 'completed');
            card.querySelector('.opcode-meta').innerText = 'Test écrit';
        } else {
            card.className = 'opcode-card pending';
            card.setAttribute('data-status', 'pending');
            card.querySelector('.opcode-meta').innerText = 'En attente';
        }

        updateProgress();
        filterCards();
    }

    function updateProgress() {
        const stored = JSON.parse(localStorage.getItem('gb_opcode_tests')) || {};
        let totalValides = 0;
        let checked = 0;

        for (let i = 0; i <= 255; i++) {
            if (opcodesData[i] && !opcodesData[i].inv) {
                totalValides++;
                if (stored[i]) checked++;
            }
        }

        document.getElementById('checked-count').innerText = checked;
        const percent = Math.round((checked / totalValides) * 100);
        document.getElementById('progress-bar').style.width = percent + '%';
        document.getElementById('progress-text').innerText = percent + '%';
    }

    function setFilter(type, button) {
        currentFilter = type;
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        button.classList.add('active');
        filterCards();
    }

    function filterCards() {
        const query = document.getElementById('search').value.toUpperCase();
        const cards = document.querySelectorAll('.opcode-card');

        cards.forEach(card => {
            const name = card.getAttribute('data-name');
            const hex = card.getAttribute('data-hex');
            const status = card.getAttribute('data-status');

            const matchesSearch = name.includes(query) || hex.includes(query);
            let matchesFilter = false;

            if (currentFilter === 'all') matchesFilter = true;
            else if (currentFilter === 'pending' && status === 'pending') matchesFilter = true;
            else if (currentFilter === 'completed' && status === 'completed') matchesFilter = true;
            else if (currentFilter === 'invalid' && status === 'invalid') matchesFilter = true;

            card.style.display = (matchesSearch && matchesFilter) ? 'flex' : 'none';
        });
    }

    // --- SYSTÈME D'IMPORT / EXPORT JSON ---

    function exportJSON() {
        const dataStr = localStorage.getItem('gb_opcode_tests');
        if (!dataStr) return;
        
        const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
        const exportFileDefaultName = 'gb_cpu_progress.json';
        
        const linkElement = document.createElement('a');
        linkElement.setAttribute('href', dataUri);
        linkElement.setAttribute('download', exportFileDefaultName);
        linkElement.click();
    }

    function triggerImport() {
        document.getElementById('file-input').click();
    }

    function importJSON(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const parsed = JSON.parse(e.target.result);
                // Validation ultra basique du format attendu
                if (typeof parsed === 'object' && parsed !== null) {
                    localStorage.setItem('gb_opcode_tests', JSON.stringify(parsed));
                    init(); // Recharge la grille
                    alert('Progression importée avec succès !');
                } else {
                    alert('Format de fichier invalide.');
                }
            } catch (err) {
                alert('Erreur lors de la lecture du fichier JSON.');
            }
        };
        reader.readAsText(file);
    }

    window.onload = init;
</script>
</body>
</html>
